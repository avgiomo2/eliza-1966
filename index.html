<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELIZA — The Original AI</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #00c896;
    --accent-dim: #007a5c;
    --text: #e8e8e8;
    --text-dim: #888;
    --eliza: #00c896;
    --user: #7eb8f7;
    --font: 'Courier New', Courier, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  header .subtitle {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  select, input[type="text"], input[type="password"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 8px;
    font-family: var(--font);
    font-size: 0.75rem;
    border-radius: 3px;
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--accent-dim);
  }
  #apiKeyInput {
    width: 200px;
    letter-spacing: 1px;
  }
  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 10px;
    font-family: var(--font);
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,150,0.08); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: var(--bg); }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg {
    max-width: 700px;
    line-height: 1.6;
    font-size: 0.9rem;
    padding: 10px 14px;
    border-radius: 4px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .msg.eliza {
    border-left: 2px solid var(--eliza);
    color: var(--eliza);
    background: rgba(0,200,150,0.04);
    align-self: flex-start;
  }
  .msg.eliza::before { content: "ELIZA › "; font-weight: bold; letter-spacing: 1px; }
  .msg.user {
    border-left: 2px solid var(--user);
    color: var(--user);
    background: rgba(126,184,247,0.04);
    align-self: flex-end;
    text-align: right;
  }
  .msg.user::before { content: "YOU › "; font-weight: bold; letter-spacing: 1px; color: var(--user); }
  .msg.system {
    color: var(--text-dim);
    font-size: 0.75rem;
    border-left: 2px solid var(--border);
    background: none;
    align-self: center;
    font-style: italic;
  }
  footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: var(--font);
    font-size: 0.9rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }
  #userInput:focus { border-color: var(--accent-dim); }
  #userInput::placeholder { color: var(--text-dim); }
  #sendBtn {
    background: var(--accent-dim);
    color: #fff;
    border: none;
    padding: 10px 18px;
    font-family: var(--font);
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  #sendBtn:hover { background: var(--accent); }
  #micBtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #micBtn:hover { border-color: var(--user); color: var(--user); }
  #micBtn.listening { border-color: red; color: red; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .voice-indicator {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-width: 60px;
    text-align: center;
  }
  .api-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>ELIZA</h1>
    <div class="subtitle">MIT AI Lab · 1966 · Joseph Weizenbaum</div>
  </div>
  <div class="controls">
    <select id="langSelect" title="Language">
      <option value="en">EN</option>
      <option value="de">DE</option>
      <option value="fr">FR</option>
      <option value="it">IT</option>
      <option value="es">ES</option>
    </select>
    <button class="btn" id="ttsToggle" title="Toggle ElevenLabs TTS">🔊 TTS</button>
    <span class="api-label">ElevenLabs key:</span>
    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" title="ElevenLabs API key for TTS">
    <button class="btn" id="resetBtn">↺ RESET</button>
  </div>
</header>

<div id="chat"></div>

<footer>
  <button id="micBtn" title="Hold to speak">🎤</button>
  <span class="voice-indicator" id="voiceStatus"></span>
  <input type="text" id="userInput" placeholder="Talk to ELIZA…” autocomplete="off">
  <button id="sendBtn">SEND</button>
</footer>
